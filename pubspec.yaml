name: valiotdashboard
description: "IoT MQTT Panel - Dashboard for IoT devices with MQTT connectivity"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # MQTT
  mqtt_client: ^10.5.0
  
  # Charts & Gauges
  fl_chart: ^0.69.2
  syncfusion_flutter_gauges: ^28.1.33
  
  # UI & Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true